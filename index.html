<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARMAD SPORT | یاریێن ڕاستەوخۆ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">SARMAD SPORT ⚽</div>
        <p class="subtitle">بۆ تەماشەکرنا بهێزترین یاریێن جیهانی ب کوالیتییا بەرز</p>
    </header>

    <main>
        <h2 class="section-title">🔥 یاریێن لایڤ یێن ئەڤڕۆ</h2>
        
        <div class="matches-container">
            

            <div class="match-card">
                <div class="live-badge">7:00</div>
                
                <div class="match-details">
                    <div class="team">
                        <span class="flag"></span>
                        <span class="team-name">إنجلترا</span>
                    </div>
                    
                    <div class="score-container">
                        <span class="score-dash">-</span>
                    </div>
                    
                    <div class="team">
                        <span class="flag"></span>
                        <span class="team-name">الكونغو الديمقراطية</span>
                    </div>
                </div>

                <button class="watch-btn" onclick="goToLive('http://footballi.net/live/show/15163?prev=live&type=conductor')">تەماشەبکە ب لایڤ 📺</button>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
