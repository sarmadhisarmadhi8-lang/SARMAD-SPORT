<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARMAD SPORT - لایڤ</title>
    <!-- گرێدانا فایلا CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <!-- سەرپەرشتێ ماڵپەری -->
        <div class="header-section">
            <h1>که نالێ وه رزشى یێ ڕاستەوخۆ ⚽</h1>
            <h2>SARMAD SPORT</h2>
        </div>

        <!-- سندوقا سەرەکی یا یاریێ -->
        <div class="match-card">
            
            <!-- نیشانا ڕاستەوخۆ LIVE -->
            <div class="live-badge">
                <span class="dot"></span> 7:00 (LIVE)
            </div>
            
            <!-- پشکا تیمان و لۆگۆیان -->
            <div class="teams-container">
                <!-- تیما ئێکێ: ڕیال مەدرید -->
                <div class="team-box">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Flag_of_England.svg" alt="إنجلترا"> ">
                    <p class="team-title">إنجلترا</p>
                </div>

                <!-- بازنێ دژى -->
                <div class="vs-circle">دژى</div>

                <!-- تیما دووێ: بەرشەلۆنە -->
                <div class="team-box">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Flag_of_the_Democratic_Republic_of_the_Congo.svg/250px-Flag_of_the_Democratic_Republic_of_the_Congo.svg.png" alt="الكونغو الديمقراطية">
                    <p class="team-title">الكونغو الديمقراطية</p>
                </div>
            </div>

            <!-- پلوتکا شین یا تەماشاکرنێ -->
            <button class="watch-live-btn" onclick="goToLive('')">
                کلیک بکه بۆ ته ماشه کردنا یاریێ
            </button>

        </div>
    </div>

    <!-- گرێدانا فایلا JavaScript -->
    <script src="script.js"></script>
</body>
</html>
